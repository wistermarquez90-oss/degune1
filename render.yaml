services:
  - type: web
    name: dengue-app
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: dengue-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
    autoDeploy: true

databases:
  - name: dengue-db
    plan: free
    region: oregon
    ipAllowList: []
